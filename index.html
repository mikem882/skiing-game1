<!DOCTYPE html>
<html>
<head>
  <title>Best vs Worst Ski Day</title>
  <style>
    body{
      font-family:Arial;
      text-align:center;
      background:#e8f6ff;
      padding:30px;
    }
    #story{font-size:22px;margin:30px;}
    button{
      padding:12px 20px;
      margin:10px;
      font-size:16px;
      border-radius:8px;
      border:none;
      background:#2e86de;
      color:white;
      cursor:pointer;
    }
    button:hover{background:#1b4f72;}
  </style>
</head>

<body>

<h1>🎿 Best vs Worst Ski Day 🎿</h1>
<h2 id="meter">Enjoyment: 50</h2>
<div id="story"></div>
<div id="choices"></div>

<script>
let enjoyment=50;
let current=0;
let activeCurveball=null;

const scenarios=[
{ text:"You wake up to fresh powder!", choices:[
  {text:"Get there early", enjoyment:+10, next:1},
  {text:"Sleep in", enjoyment:-5, next:1}]},

{ text:"You arrive at the mountain.", choices:[
  {text:"Warm up on greens", enjoyment:+3, next:2},
  {text:"Hit blacks immediately", enjoyment:+7, next:2}]},

{ text:"Lift lines start forming.", choices:[
  {text:"Wait patiently", enjoyment:-2, next:3},
  {text:"Find side lifts", enjoyment:+5, next:3}]},

{ text:"You find a powder stash.", choices:[
  {text:"Drop in!", enjoyment:+8, next:4},
  {text:"Play safe", enjoyment:-2, next:4}]},

{ text:"Lunch time at the lodge.", choices:[
  {text:"Quick snack", enjoyment:+2, next:5},
  {text:"Big hot meal", enjoyment:+5, next:5}]},

{ text:"Back skiing after lunch.", choices:[
  {text:"Push harder", enjoyment:+6, next:6},
  {text:"Relax and cruise", enjoyment:+2, next:6}]},

{ text:"Clouds roll in.", choices:[
  {text:"Keep skiing", enjoyment:+3, next:7},
  {text:"Take lodge break", enjoyment:+1, next:7}]},

{ text:"Last chair approaching.", choices:[
  {text:"One more run!", enjoyment:+4, next:8},
  {text:"End early", enjoyment:-2, next:8}]},

{ text:"Final run of the day.", choices:[
  {text:"Send it!", enjoyment:+7, next:9},
  {text:"Cruise safely", enjoyment:+3, next:9}]},

{ text:"Après ski time.", choices:[
  {text:"Hot chocolate", enjoyment:+3, next:10},
  {text:"Head straight home", enjoyment:-1, next:10}]},

{ text:"Your ski day is over!", end:true }
];

const curveballs=[
{ text:"Your ski pole snaps!", choices:[
  {text:"Keep skiing", enjoyment:-5, next:5},
  {text:"Get replacement", enjoyment:-2, next:5}]},
{ text:"Chair lifts stop!", choices:[
  {text:"Wait", enjoyment:-4, next:5},
  {text:"Hike hill", enjoyment:-8, next:5}]},
{ text:"You fall in a freezing river!", choices:[
  {text:"Warm up", enjoyment:-6, next:5},
  {text:"Keep skiing soaked", enjoyment:-10, next:5}]},
{ text:"Phone falls off lift!", choices:[
  {text:"Search", enjoyment:-5, next:5},
  {text:"Accept loss", enjoyment:-3, next:5}]}
];

function getEnding(score){
 if(score<=9)return"Your day was mid 😐";
 if(score<=25)return"Rough day 😬";
 if(score<=50)return"Decent ski day 🙂";
 if(score<=75)return"Awesome day 🤩";
 return"Best ski day ever!! 🏆";
}

function showScenario(){
 const story=document.getElementById("story");
 const choices=document.getElementById("choices");
 const meter=document.getElementById("meter");
 meter.textContent="Enjoyment: "+enjoyment;
 choices.innerHTML="";
 const scene=scenarios[current];
 story.textContent=scene.text;

 if(scene.end){
  const result=document.createElement("h2");
  result.textContent=getEnding(enjoyment);
  story.appendChild(result);
  const restart=document.createElement("button");
  restart.textContent="Play Again";
  restart.onclick=()=>{enjoyment=50;current=0;activeCurveball=null;showScenario();};
  choices.appendChild(restart);
  return;
 }

 scene.choices.forEach(choice=>{
  const btn=document.createElement("button");
  btn.textContent=choice.text;
  btn.onclick=()=>{
   enjoyment+=choice.enjoyment;
   enjoyment=Math.max(0,Math.min(100,enjoyment));

   if(current===4 && activeCurveball===null){
     activeCurveball=curveballs[Math.floor(Math.random()*curveballs.length)];
     showCurveball();
     return;
   }

   current=choice.next;
   showScenario();
  };
  choices.appendChild(btn);
 });
}

function showCurveball(){
 const story=document.getElementById("story");
 const choices=document.getElementById("choices");
 story.textContent=activeCurveball.text;
 choices.innerHTML="";
 activeCurveball.choices.forEach(choice=>{
  const btn=document.createElement("button");
  btn.textContent=choice.text;
  btn.onclick=()=>{
   enjoyment+=choice.enjoyment;
   current=choice.next;
   showScenario();
  };
  choices.appendChild(btn);
 });
}

showScenario();
</script>

</body>
</html>
