<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cool Skiing Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #e6f7ff;
      margin: 0;
      padding: 20px;
    }

    #story {
      font-size: 20px;
      margin: 20px;
    }

    #choices button {
      margin: 10px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    #meter {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🎿 Cool Skiing Game</h1>

  <div id="story"></div>
  <div id="choices"></div>
  <div id="meter"></div>

  <script>
    let enjoyment = 40;

    const story = document.getElementById("story");
    const choices = document.getElementById("choices");
    const meter = document.getElementById("meter");

    function updateMeter() {
      meter.textContent = "Enjoyment: " + enjoyment;
    }

    function showScenario(text, options) {
      story.textContent = text;
      choices.innerHTML = "";

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option.text;
        btn.onclick = option.action;
        choices.appendChild(btn);
      });

      updateMeter();
    }

    function startGame() {
      showScenario("You are at the top of a mountain. What do you do?", [
        {
          text: "go down fast",
          action: () => {
            enjoyment += 30;
            scenario2();
          }
        },
        {
          text: "Go slowly",
          action: () => {
            enjoyment -=5 ;
            scenario2();
          }
        }
      ]);
    }

    function scenario2() {
      showScenario("You hit a jump!", [
        {
          text: "Do a trick",
          action: () => {
            enjoyment += 20;
            endGame();
          }
        },
        {
          text: "Play it safe",
          action: () => {
            enjoyment -= 10;
            endGame();
          }
        }
      ]);
    }
function senario3() {
  showScenario("You fall", [
    {
      text:"call ski patrol and get towed down",
      action: () => {
        enjoyment -= 15;
        endGame();
      }
    },
    {
      text: "Push through the pain"
        action: () => {
    enjoyment -=5;
    endGame();
  }
}
]);
    function endGame() {
      showScenario("You reached the bottom of the mountain!", [
        {
          text: "Play again",
          action: () => {
            enjoyment = 50;
            startGame();
          }
        }
      ]);
    }

    startGame();
  </script>

</body>
</html>
